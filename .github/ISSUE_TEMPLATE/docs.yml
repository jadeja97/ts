name: "Documentation"
description: Suggest a change or new page to be added to `@jadeja/ts`
title: "[docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue!

  - type: checkboxes
    id: documentation_is
    attributes:
      label: Documentation is
      options:
        - label: Missing
        - label: Outdated
        - label: Confusing
        - label: Not sure?

  - type: textarea
    id: description
    attributes:
      label: Explain in Detail
      description:
        A clear and concise description of your suggestion. If you intend to submit a PR for this
        issue, tell us in the description. Thanks!
      placeholder: The description of ... page is not clear. I thought it meant ... but it wasn't.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Your Suggestion for Changes
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      description:
        By submitting this issue, you agree to follow our [Contributing
        Guidelines](https://github.com/JadejaHQ/ts/blob/main/CONTRIBUTING.md).
      options:
        - label: I've made research efforts and searched the documentation
          required: true
        - label: I've searched for existing issues
          required: true
        - label: I understand that this will be closed if it doesn't meet the above criteria
          required: true
